<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#7c3aed" />
    <title>Contento is offline</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #18181b;
      }

      main {
        width: min(32rem, calc(100vw - 2rem));
        border: 1px solid color-mix(in srgb, currentColor 12%, transparent);
        border-radius: 18px;
        padding: 2rem;
        background: color-mix(in srgb, canvas 94%, #7c3aed 6%);
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.16);
      }

      h1 {
        margin: 0;
        font-size: 1.35rem;
      }

      p {
        margin: 0.75rem 0 0;
        line-height: 1.6;
        color: color-mix(in srgb, currentColor 68%, transparent);
      }

      a {
        display: inline-flex;
        margin-top: 1.5rem;
        min-height: 2.5rem;
        align-items: center;
        border-radius: 10px;
        background: #7c3aed;
        color: white;
        padding: 0 1rem;
        text-decoration: none;
        font-weight: 650;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Contento is offline</h1>
      <p>The app shell is available, but this page needs a network connection to load fresh workspace data.</p>
      <a href="/">Try again</a>
    </main>
  </body>
</html>
