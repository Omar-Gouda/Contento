<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#7c3aed" />
    <title>Contento is offline</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 20% 18%, rgba(124, 58, 237, 0.28), transparent 34%),
          radial-gradient(circle at 82% 80%, rgba(192, 132, 252, 0.18), transparent 28%),
          #0f0b1a;
        color: #f8fafc;
      }

      main {
        width: min(32rem, calc(100vw - 2rem));
        border: 1px solid rgba(233, 213, 255, 0.16);
        border-radius: 18px;
        padding: 2rem;
        background: rgba(15, 11, 26, 0.78);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
        backdrop-filter: blur(22px);
      }

      img {
        width: 12rem;
        max-width: 70%;
        height: auto;
        margin-bottom: 1.75rem;
      }

      h1 {
        margin: 0;
        font-size: 1.35rem;
      }

      p {
        margin: 0.75rem 0 0;
        line-height: 1.6;
        color: rgba(248, 250, 252, 0.7);
      }

      a {
        display: inline-flex;
        margin-top: 1.5rem;
        min-height: 2.5rem;
        align-items: center;
        border-radius: 10px;
        background: #7c3aed;
        color: white;
        padding: 0 1rem;
        text-decoration: none;
        font-weight: 650;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/brand/contento-logo-dark.svg" alt="Contento" />
      <h1>Contento is offline</h1>
      <p>The app shell is available, but this page needs a network connection to load fresh workspace data.</p>
      <a href="/">Try again</a>
    </main>
  </body>
</html>
